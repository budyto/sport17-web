<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Panel admin · SPORT17</title>
    <link rel="icon" href="../logo2.0.webp" />

    <!-- DEFENSA EN PROFUNDIDAD: si la URL llega con credenciales (?password=...
         por un submit GET accidental, link compartido, autocompletado, etc.),
         las borramos del historial inmediatamente, antes de cualquier módulo. -->
    <script>
    (function () {
      if (!window.location.search) return;
      var params = new URLSearchParams(window.location.search);
      var sensitive = ["password", "pass", "pwd", "email", "token", "secret", "key", "apikey"];
      var dirty = false;
      sensitive.forEach(function (k) { if (params.has(k)) { params.delete(k); dirty = true; } });
      if (dirty) {
        var clean = window.location.pathname + (params.toString() ? "?" + params.toString() : "") + window.location.hash;
        window.history.replaceState({}, "", clean);
      }
    })();
    </script>

    <link rel="stylesheet" href="./admin.css" />
    <script type="module" src="./admin.js" defer></script>
  </head>
  <body>

    <!-- ═══ LOGIN ═══ -->
    <!-- Visible por default: si el JS o Firebase fallan, el login se muestra igual. -->
    <section id="login-screen" class="login-screen">
      <div class="login-card">
        <img src="../logo2.0.webp" alt="SPORT17" class="login-logo" />
        <h1>Panel admin SPORT17</h1>
        <p class="login-sub">Ingresá con tus credenciales para gestionar la tienda.</p>

        <!-- method="post" + action="javascript:void(0)" garantiza que NUNCA
             se envíe nativamente por GET (lo que pondría la contraseña en la URL).
             El submit real lo maneja admin.js con preventDefault. -->
        <form id="login-form" class="login-form" method="post" action="javascript:void(0)" autocomplete="on" novalidate>
          <label>
            <span>Email</span>
            <input type="email" name="email" required autocomplete="username" />
          </label>
          <label>
            <span>Contraseña</span>
            <input type="password" name="password" required autocomplete="current-password" />
          </label>
          <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
          <p id="login-error" class="login-error" hidden></p>
          <a href="#" id="forgot-password" class="login-forgot">¿Olvidaste tu contraseña?</a>
        </form>

        <p class="login-foot">Acceso restringido. Si no sos administrador, volvé al <a href="../index.html">sitio</a>.</p>
      </div>
    </section>

    <!-- ═══ APP ═══ -->
    <div id="app" class="app" hidden>

      <!-- ─── Sidebar ─── -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <img src="../logo2.0.webp" alt="SPORT17" />
          <div>
            <strong>SPORT17</strong>
            <span>Panel admin</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a href="#/dashboard" data-route="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="#/products" data-route="products">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            Productos
          </a>
          <a href="#/categories" data-route="categories">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Categorías
          </a>
          <a href="#/stock" data-route="stock">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v4H3z"/><path d="M3 11h18v4H3z"/><path d="M3 19h18v2H3z"/></svg>
            Stock y precios
          </a>
          <a href="#/import" data-route="import">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Importar / Exportar
          </a>
          <a href="#/settings" data-route="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Configuración
          </a>
        </nav>

        <div class="sidebar-foot">
          <a href="../index.html" target="_blank" class="sidebar-foot-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Ver tienda
          </a>
          <button id="logout-btn" type="button" class="sidebar-foot-link logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salir
          </button>
        </div>
      </aside>

      <!-- ─── Main ─── -->
      <main class="main">
        <header class="topbar">
          <button class="topbar-menu" id="topbar-menu" aria-label="Abrir menú">
            <span></span><span></span><span></span>
          </button>
          <h1 id="page-title">Dashboard</h1>
          <div class="topbar-user">
            <span class="user-email" id="user-email"></span>
            <span class="user-avatar" id="user-avatar">A</span>
          </div>
        </header>

        <section id="route-outlet" class="route-outlet">
          <!-- Las vistas se renderizan acá -->
        </section>
      </main>
    </div>

    <!-- ═══ TOASTS ═══ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ═══ MODAL ROOT ═══ -->
    <div id="modal-root" class="modal-root" hidden></div>

  </body>
</html>
