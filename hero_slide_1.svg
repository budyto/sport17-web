  <image href="./logo2.0.png" x="740" y="138" width="120" height="120" preserveAspectRatio="xMidYMid meet"/>
  <text x="800" y="300" font-family="Arial, Helvetica, sans-serif" font-size="54" fill="#111" font-weight="800" text-anchor="middle" letter-spacing="6">SPORT17</text>
  <text x="800" y="345" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#6d6d6d" text-anchor="middle" letter-spacing="4">ROPA DEPORTIVA URBANA</text>

  <rect x="130" y="220" width="420" height="620" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="1050" y="220" width="420" height="620" rx="34" fill="#ffffff" filter="url(#shadow)"/>

  <image href="./masculino/conjunto_deportivo_argentina_azul.jpeg" x="146" y="236" width="388" height="588" preserveAspectRatio="xMidYMid slice"/>
  <image href="./femenino/conjunto_deportivo_naranja_canguro.jpeg" x="1066" y="236" width="388" height="588" preserveAspectRatio="xMidYMid slice"/>

  <rect x="90" y="830" width="260" height="70" rx="18" fill="#111"/>
  <text x="220" y="873" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#fff" font-weight="700" text-anchor="middle">NUEVA COLECCION</text>

  <rect x="1250" y="830" width="260" height="70" rx="18" fill="#111"/>
  <text x="1380" y="873" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#fff" font-weight="700" text-anchor="middle">NUEVA COLECCION</text>
